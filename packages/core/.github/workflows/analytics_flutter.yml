name: Analytics Flutter Build and Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build_and_test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
      # 9
    - uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: "13.0.2+10"
    # 10   
    - uses: subosito/flutter-action@v2
      with:
        # 11
        flutter-version: "3.0.0"
        channel: 'stable'

    - name: Get dependencies
      run: flutter pub get

    - name: Analyze Dart code
      run: flutter analyze

    - name: Run unit tests
      run: flutter test

    - name: Build APK
      run: flutter build apk

    - name: Build iOS
      run: flutter build ios --no-codesign

    - name: Archive and upload iOS artifacts
      if: success() && startsWith(runner.os, 'macOS')
      uses: actions/upload-artifact@v2
      with:
        name: ios-build
        path: build/ios

    - name: Archive and upload APK
      if: success() && startsWith(runner.os, 'Linux')
      uses: actions/upload-artifact@v2
      with:
        name: apk-build
        path: build/app/outputs/flutter-apk/app-release.apk
